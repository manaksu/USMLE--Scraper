<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM Residency Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .icon { font-size: 2rem; margin-bottom: 14px; }
    h1 { font-size: 1.35rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
    .sub { color: #718096; font-size: 0.88rem; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #4a5568; margin-bottom: 7px; letter-spacing: 0.04em; text-transform: uppercase; }
    input {
      width: 100%; padding: 13px 15px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 0.95rem; color: #2d3748; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4299e1; }
    button {
      margin-top: 14px; width: 100%; padding: 13px;
      background: #2b6cb0; color: white; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover:not(:disabled) { background: #2c5282; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result { margin-top: 22px; padding: 16px 18px; border-radius: 10px; display: none; line-height: 1.6; }
    .ok  { background: #f0fff4; border: 1.5px solid #9ae6b4; color: #22543d; }
    .err { background: #fff5f5; border: 1.5px solid #feb2b2; color: #742a2a; }
    .tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.65; margin-bottom: 6px; }
    a { color: #2b6cb0; word-break: break-all; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🏥</div>
  <h1>FM Residency Finder</h1>
  <p class="sub">Paste any hospital website — the tool finds their Family Medicine Residency page for you.</p>

  <label for="url">Hospital Website</label>
  <input id="url" type="url" placeholder="https://www.hospital.org" />
  <button id="btn" onclick="find()">
    <div class="spinner" id="spin"></div>
    <span id="btn-text">Find FM Residency Page</span>
  </button>

  <div id="result"></div>
</div>

<script>
  async function find() {
    const url = document.getElementById('url').value.trim();
    if (!url) return;

    const btn = document.getElementById('btn');
    const spin = document.getElementById('spin');
    const label = document.getElementById('btn-text');
    const result = document.getElementById('result');

    btn.disabled = true;
    spin.style.display = 'block';
    label.textContent = 'Searching...';
    result.style.display = 'none';

    try {
      const r = await fetch('/find', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const d = await r.json();

      result.style.display = 'block';
      if (d.link) {
        result.className = 'ok';
        result.innerHTML = `<div class="tag">✓ Found</div><a href="${d.link}" target="_blank">${d.link}</a>`;
      } else {
        result.className = 'err';
        result.innerHTML = `<div class="tag">Not found</div>${d.error || 'No FM Residency link on this page. Try their GME or Residency section directly.'}`;
      }
    } catch (e) {
      result.style.display = 'block';
      result.className = 'err';
      result.innerHTML = `<div class="tag">Error</div>${e.message}`;
    }

    btn.disabled = false;
    spin.style.display = 'none';
    label.textContent = 'Find FM Residency Page';
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') find();
  });
</script>
</body>
</html>
