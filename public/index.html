<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FM Residency Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef2f7; min-height: 100vh; padding: 28px 20px; }

    .top { margin: 0 auto 20px; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
    .sub { color: #718096; font-size: 0.85rem; margin-bottom: 16px; }

    .upload-area {
      border: 2px dashed #cbd5e0; border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer; background: white;
      transition: border-color 0.15s; color: #718096; max-width: 560px;
    }
    .upload-area:hover, .upload-area.drag { border-color: #4299e1; background: #ebf8ff; }
    .upload-area .uicon { font-size: 1.6rem; margin-bottom: 6px; }
    .upload-area p { font-size: 0.85rem; }
    .upload-area strong { color: #2b6cb0; }
    .hint { font-size: 0.74rem; color: #a0aec0; margin-top: 5px; }

    /* Toolbar */
    .toolbar { display: none; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar-info { font-size: 0.83rem; color: #4a5568; font-weight: 600; margin-right: 4px; }
    .divider { width: 1px; height: 22px; background: #e2e8f0; margin: 0 4px; }

    .btn { padding: 7px 13px; border: none; border-radius: 7px; font-size: 0.81rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-blue   { background: #ebf8ff; color: #2b6cb0; }
    .btn-blue:hover:not(:disabled)   { background: #bee3f8; }
    .btn-green  { background: #f0fff4; color: #276749; }
    .btn-green:hover:not(:disabled)  { background: #c6f6d5; }
    .btn-red    { background: #fff5f5; color: #c53030; }
    .btn-red:hover:not(:disabled)    { background: #fed7d7; }
    .btn-solid  { background: #276749; color: white; }
    .btn-solid:hover:not(:disabled)  { background: #22543d; }
    .btn-sm { padding: 4px 8px; font-size: 0.73rem; }

    /* Status bar */
    .status-bar { display: none; align-items: center; gap: 10px; margin-bottom: 12px; background: white; border-radius: 10px; padding: 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .status-text { font-size: 0.82rem; color: #4a5568; flex: 1; }
    .progress-bar { flex: 0 0 180px; background: #e2e8f0; border-radius: 99px; height: 7px; overflow: hidden; }
    .progress-fill { background: #3182ce; height: 100%; border-radius: 99px; transition: width 0.3s; }

    /* Table */
    .table-wrap { background: white; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow-x: auto; display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: #f7fafc; font-size: 0.71rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #718096; padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    th.added { background: #fffbeb; color: #b7791f; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; color: #2d3748; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }
    tr.running td { background: #ebf8ff; }

    .csv-cell { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #4a5568; }
    .link-cell a { color: #2b6cb0; font-size: 0.78rem; word-break: break-all; text-decoration: none; }
    .link-cell a:hover { text-decoration: underline; }

    /* Editable website field */
    .web-wrap { display: flex; align-items: center; gap: 4px; min-width: 180px; }
    .web-input { flex: 1; padding: 4px 7px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.75rem; color: #2d3748; outline: none; min-width: 0; }
    .web-input:focus { border-color: #4299e1; }
    .web-input.has-value { border-color: #9ae6b4; background: #f0fff4; }

    .apply-wrap { display: flex; align-items: center; gap: 4px; min-width: 180px; }
    .apply-input { flex: 1; padding: 4px 7px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.75rem; color: #2d3748; outline: none; min-width: 0; }
    .apply-input:focus { border-color: #4299e1; }
    .apply-input.has-value { border-color: #9ae6b4; background: #f0fff4; }

    .spin { width: 9px; height: 9px; border: 2px solid rgba(0,0,0,0.12); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge { display: inline-block; padding: 2px 6px; border-radius: 99px; font-size: 0.68rem; font-weight: 600; }
    .badge-ok   { background: #c6f6d5; color: #276749; }
    .badge-err  { background: #fed7d7; color: #9b2c2c; }
    .badge-wait { background: #e2e8f0; color: #718096; }
  </style>
</head>
<body>

<div class="top">
  <h1>🏥 FM Residency Finder</h1>
  <p class="sub">Upload your program CSV — all columns shown. Find websites and residency links per row or in bulk.</p>

  <div class="upload-area" id="upload-area"
       onclick="document.getElementById('file-input').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <div class="uicon">📄</div>
    <p><strong>Click to upload</strong> or drag and drop</p>
    <p class="hint">CSV or TXT — all columns shown as-is</p>
  </div>
  <input type="file" id="file-input" accept=".csv,.txt" style="display:none" onchange="handleFile(this.files[0])"/>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <span class="toolbar-info" id="toolbar-info"></span>
  <div class="divider"></div>
  <button class="btn btn-blue" id="btn-all-web" onclick="bulkWebsite()">🌐 Get All Websites</button>
  <button class="btn btn-green" id="btn-all-res" onclick="bulkResidency()">🔍 Get All Residency Pages</button>
  <button class="btn btn-red" id="btn-stop" onclick="stopBulk()" style="display:none">⏹ Stop</button>
  <div class="divider"></div>
  <button class="btn btn-solid" onclick="downloadCSV()">⬇ Download CSV</button>
</div>

<!-- Status bar -->
<div class="status-bar" id="status-bar">
  <span class="status-text" id="status-text">Running…</span>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span style="font-size:0.78rem;color:#718096" id="status-count"></span>
</div>

<!-- Table -->
<div class="table-wrap" id="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  let csvHeaders = [];
  let programs = [];
  let nameCol = 0;
  let stopFlag = false;
  let bulkRunning = false;

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-area').classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  }

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => init(e.target.result, file.name.endsWith('.csv'));
    reader.readAsText(file);
  }

  function init(text, isCsv) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    if (!lines.length) return;
    if (isCsv) {
      csvHeaders = parseRow(lines[0]);
      const lower = csvHeaders.map(h => h.toLowerCase());
      nameCol = lower.findIndex(h => ['name','program','hospital','facility','program name','hospital name'].includes(h));
      if (nameCol === -1) nameCol = 0;
      programs = lines.slice(1)
        .map(l => ({ _csv: parseRow(l), website: '', fmLink: '', applyLink: '' }))
        .filter(p => p._csv.some(c => c));
    } else {
      csvHeaders = ['Program Name'];
      nameCol = 0;
      programs = lines.map(l => ({ _csv: [l], website: '', fmLink: '', applyLink: '' }));
    }
    renderTable();
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('table-wrap').style.display = 'block';
    document.getElementById('toolbar-info').textContent = `${programs.length} program${programs.length !== 1 ? 's' : ''} loaded`;
  }

  function parseRow(line) {
    const cells = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  }

  function getName(i) { return programs[i]._csv[nameCol] || ''; }

  function renderTable() {
    document.getElementById('thead').innerHTML = '<tr>' +
      csvHeaders.map(h => `<th>${esc(h)}</th>`).join('') +
      `<th class="added">Website</th><th class="added">FM Residency Page</th><th class="added">Apply Link</th><th class="added">Actions</th></tr>`;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    programs.forEach((_, i) => tbody.appendChild(buildRow(i)));
  }

  function buildRow(i) {
    const p = programs[i];
    const tr = document.createElement('tr');
    tr.id = `row-${i}`;

    const csvCells = csvHeaders.map((_, ci) =>
      `<td class="csv-cell" title="${esc(p._csv[ci]||'')}">${esc(p._csv[ci]||'')}</td>`).join('');

    // Website — editable input + search button
    const webVal = esc(p.website || '');
    const webCell = `<td>
      <div class="web-wrap">
        <input class="web-input ${p.website ? 'has-value' : ''}" id="web-input-${i}"
          placeholder="Auto or paste…" value="${webVal}"
          oninput="programs[${i}].website=this.value;this.classList.toggle('has-value',!!this.value);document.getElementById('btn-res-${i}').disabled=!this.value"/>
        <button class="btn btn-blue btn-sm" id="btn-web-${i}" onclick="getWebsite(${i})" title="Search website">
          <div class="spin" id="spin-web-${i}"></div>🌐
        </button>
      </div>
    </td>`;

    // FM link
    const fmCell = `<td class="link-cell" id="cell-fm-${i}">${renderLink(p.fmLink)}</td>`;

    // Apply — editable
    const applyCell = `<td>
      <div class="apply-wrap">
        <input class="apply-input ${p.applyLink ? 'has-value' : ''}" id="apply-input-${i}"
          placeholder="Auto or paste…" value="${esc(p.applyLink||'')}"
          oninput="programs[${i}].applyLink=this.value;this.classList.toggle('has-value',!!this.value)"/>
      </div>
    </td>`;

    // Actions
    const actions = `<td style="white-space:nowrap">
      <button class="btn btn-green btn-sm" id="btn-res-${i}" onclick="getResidency(${i})" ${p.website ? '' : 'disabled'} title="Get FM Residency Page">
        <div class="spin" id="spin-res-${i}"></div>🔍
      </button>
    </td>`;

    tr.innerHTML = csvCells + webCell + fmCell + applyCell + actions;
    return tr;
  }

  function refreshRow(i) {
    const old = document.getElementById(`row-${i}`);
    if (old) old.replaceWith(buildRow(i));
  }

  function renderLink(url) {
    if (!url) return `<span class="badge badge-wait">—</span>`;
    const short = url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    return `<a href="${url}" target="_blank" title="${url}">${short.length>30 ? short.slice(0,30)+'…' : short}</a>`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Individual website search ─────────────────────────────────
  async function getWebsite(i) {
    const btn = document.getElementById(`btn-web-${i}`);
    const spin = document.getElementById(`spin-web-${i}`);
    const input = document.getElementById(`web-input-${i}`);
    if (!btn || !input) return;
    btn.disabled = true; spin.style.display = 'inline-block';
    input.value = '';
    input.placeholder = 'Searching…';
    input.classList.remove('has-value');
    input.style.borderColor = '';
    try {
      const r = await fetch('/api/website', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ programName: getName(i) })
      });
      const d = await r.json();
      const url = d.website || '';
      programs[i].website = url;
      input.value = url;
      input.placeholder = url ? 'Auto or paste…' : 'Not found — paste manually';
      input.classList.toggle('has-value', !!url);
      input.style.borderColor = url ? '#9ae6b4' : '#feb2b2';
      const resBtn = document.getElementById(`btn-res-${i}`);
      if (resBtn) resBtn.disabled = !url;
    } catch(e) {
      input.placeholder = 'Error — paste manually';
      input.style.borderColor = '#feb2b2';
    }
    btn.disabled = false; spin.style.display = 'none';
  }

  // ── Individual residency search ───────────────────────────────
  async function getResidency(i) {
    const website = programs[i].website || document.getElementById(`web-input-${i}`)?.value?.trim();
    if (!website) return;
    programs[i].website = website;

    const btn = document.getElementById(`btn-res-${i}`);
    const spin = document.getElementById(`spin-res-${i}`);
    btn.disabled = true; spin.style.display = 'inline-block';
    document.getElementById(`cell-fm-${i}`).innerHTML = `<span class="badge badge-wait">Searching…</span>`;

    const applyEl = document.getElementById(`apply-input-${i}`);
    if (applyEl && !applyEl.value) applyEl.placeholder = 'Searching…';

    try {
      const r = await fetch('/api/residency', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ website })
      });
      const d = await r.json();
      programs[i].fmLink = d.fmLink || '';
      if (d.applyLink && !programs[i].applyLink) programs[i].applyLink = d.applyLink;

      document.getElementById(`cell-fm-${i}`).innerHTML = d.fmLink
        ? renderLink(d.fmLink) : `<span class="badge badge-err">Not found</span>`;

      if (applyEl) {
        if (d.applyLink && !applyEl.value) {
          applyEl.value = d.applyLink;
          applyEl.classList.add('has-value');
        }
        applyEl.placeholder = 'Auto or paste…';
      }
    } catch {
      document.getElementById(`cell-fm-${i}`).innerHTML = `<span class="badge badge-err">Error</span>`;
      if (applyEl) applyEl.placeholder = 'Auto or paste…';
    }
    btn.disabled = false; spin.style.display = 'none';
  }

  // ── Bulk helpers ──────────────────────────────────────────────
  function setBulkRunning(on) {
    bulkRunning = on;
    document.getElementById('btn-stop').style.display = on ? 'inline-flex' : 'none';
    document.getElementById('btn-all-web').disabled = on;
    document.getElementById('btn-all-res').disabled = on;
    document.getElementById('status-bar').style.display = on ? 'flex' : 'none';
    if (!on) { stopFlag = false; setProgress(0,0,''); }
  }

  function stopBulk() { stopFlag = true; }

  function setProgress(done, total, label) {
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('status-text').textContent = label;
    document.getElementById('status-count').textContent = total ? `${done} / ${total}` : '';
  }

  async function bulkWebsite() {
    const todo = programs.map((p,i) => i).filter(i => !programs[i].website);
    if (!todo.length) return;
    stopFlag = false; setBulkRunning(true);
    for (let n = 0; n < todo.length; n++) {
      if (stopFlag) break;
      const i = todo[n];
      setProgress(n, todo.length, `Getting website: ${getName(i)}`);
      document.getElementById(`row-${i}`).classList.add('running');
      await getWebsite(i);
      document.getElementById(`row-${i}`).classList.remove('running');
    }
    setProgress(todo.length, todo.length, stopFlag ? 'Stopped.' : 'Done.');
    setTimeout(() => setBulkRunning(false), 1500);
  }

  async function bulkResidency() {
    const todo = programs.map((p,i) => i).filter(i => programs[i].website && !programs[i].fmLink);
    if (!todo.length) return;
    stopFlag = false; setBulkRunning(true);
    for (let n = 0; n < todo.length; n++) {
      if (stopFlag) break;
      const i = todo[n];
      setProgress(n, todo.length, `Getting residency page: ${getName(i)}`);
      document.getElementById(`row-${i}`).classList.add('running');
      await getResidency(i);
      document.getElementById(`row-${i}`).classList.remove('running');
    }
    setProgress(todo.length, todo.length, stopFlag ? 'Stopped.' : 'Done.');
    setTimeout(() => setBulkRunning(false), 1500);
  }

  // ── Download ──────────────────────────────────────────────────
  function downloadCSV() {
    const headers = [...csvHeaders, 'Website', 'FM Residency Page', 'Apply Link'];
    const rows = [headers, ...programs.map((p, i) => [
      ...csvHeaders.map((_, ci) => p._csv[ci] || ''),
      document.getElementById(`web-input-${i}`)?.value || p.website || '',
      p.fmLink || '',
      document.getElementById(`apply-input-${i}`)?.value || p.applyLink || ''
    ])];
    const csv = rows.map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'fm-residency-results.csv';
    a.click();
  }
</script>
</body>
</html>
