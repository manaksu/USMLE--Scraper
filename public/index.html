<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FM Residency Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef2f7; min-height: 100vh; padding: 28px 20px; }

    .top { max-width: 100%; margin: 0 auto 20px; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
    .sub { color: #718096; font-size: 0.85rem; margin-bottom: 16px; }

    .upload-area {
      border: 2px dashed #cbd5e0; border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer; background: white;
      transition: border-color 0.15s; color: #718096; max-width: 600px;
    }
    .upload-area:hover, .upload-area.drag { border-color: #4299e1; background: #ebf8ff; }
    .upload-area .uicon { font-size: 1.6rem; margin-bottom: 6px; }
    .upload-area p { font-size: 0.85rem; }
    .upload-area strong { color: #2b6cb0; }
    .hint { font-size: 0.74rem; color: #a0aec0; margin-top: 5px; }

    /* Toolbar */
    .toolbar { display: none; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar-info { font-size: 0.83rem; color: #4a5568; font-weight: 600; }
    .btn { padding: 7px 14px; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-blue { background: #ebf8ff; color: #2b6cb0; }
    .btn-blue:hover:not(:disabled) { background: #bee3f8; }
    .btn-green { background: #f0fff4; color: #276749; }
    .btn-green:hover:not(:disabled) { background: #c6f6d5; }
    .btn-solid-green { background: #276749; color: white; }
    .btn-solid-green:hover:not(:disabled) { background: #22543d; }
    .btn-sm { padding: 4px 9px; font-size: 0.74rem; }

    /* Table */
    .table-wrap { background: white; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow-x: auto; display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: #f7fafc; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #718096; padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    th.added { background: #fffbeb; color: #b7791f; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; color: #2d3748; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    .csv-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #4a5568; }
    .link-cell a { color: #2b6cb0; font-size: 0.78rem; word-break: break-all; text-decoration: none; }
    .link-cell a:hover { text-decoration: underline; }

    /* Editable apply field */
    .apply-wrap { display: flex; align-items: center; gap: 5px; min-width: 200px; }
    .apply-input {
      flex: 1; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 0.76rem; color: #2d3748; outline: none; min-width: 0;
    }
    .apply-input:focus { border-color: #4299e1; }
    .apply-input.has-value { border-color: #9ae6b4; background: #f0fff4; }

    .spin { width: 9px; height: 9px; border: 2px solid rgba(0,0,0,0.12); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge { display: inline-block; padding: 2px 6px; border-radius: 99px; font-size: 0.68rem; font-weight: 600; }
    .badge-ok { background: #c6f6d5; color: #276749; }
    .badge-err { background: #fed7d7; color: #9b2c2c; }
    .badge-wait { background: #e2e8f0; color: #718096; }
  </style>
</head>
<body>

<div class="top">
  <h1>🏥 FM Residency Finder</h1>
  <p class="sub">Upload your program CSV — all columns shown. Get website and residency links per row, edit apply links manually, then download.</p>

  <div class="upload-area" id="upload-area"
       onclick="document.getElementById('file-input').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <div class="uicon">📄</div>
    <p><strong>Click to upload</strong> or drag and drop</p>
    <p class="hint">CSV or TXT file — all columns will be shown as-is</p>
  </div>
  <input type="file" id="file-input" accept=".csv,.txt" style="display:none" onchange="handleFile(this.files[0])"/>
</div>

<div class="toolbar" id="toolbar">
  <span class="toolbar-info" id="toolbar-info"></span>
  <button class="btn btn-blue" onclick="getWebsiteAll()">🌐 Get All Websites</button>
  <button class="btn btn-green" onclick="getResidencyAll()">🔍 Get All Residency Pages</button>
  <button class="btn btn-solid-green" onclick="downloadCSV()">⬇ Download CSV</button>
</div>

<div class="table-wrap" id="table-wrap">
  <table id="main-table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  let csvHeaders = [];   // original CSV headers
  let programs = [];     // [{...csvData, website, fmLink, applyLink}]
  let nameCol = 0;       // which column has the program/hospital name

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-area').classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  }

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => init(e.target.result, file.name.endsWith('.csv'));
    reader.readAsText(file);
  }

  function init(text, isCsv) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    if (!lines.length) return;

    if (isCsv) {
      csvHeaders = parseRow(lines[0]);
      // Detect name column
      const lower = csvHeaders.map(h => h.toLowerCase());
      nameCol = lower.findIndex(h => ['name','program','hospital','facility','program name','hospital name'].includes(h));
      if (nameCol === -1) nameCol = 0;

      programs = lines.slice(1).map(line => {
        const cells = parseRow(line);
        const obj = { _csv: cells, website: '', fmLink: '', applyLink: '' };
        return obj;
      }).filter(p => p._csv.some(c => c));
    } else {
      csvHeaders = ['Program Name'];
      nameCol = 0;
      programs = lines.map(line => ({ _csv: [line], website: '', fmLink: '', applyLink: '' }));
    }

    renderTable();
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('table-wrap').style.display = 'block';
    document.getElementById('toolbar-info').textContent = `${programs.length} program${programs.length !== 1 ? 's' : ''} loaded`;
  }

  function parseRow(line) {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  }

  function getName(i) {
    return programs[i]._csv[nameCol] || '';
  }

  function renderTable() {
    // Headers
    const thead = document.getElementById('thead');
    thead.innerHTML = '<tr>' +
      csvHeaders.map(h => `<th>${esc(h)}</th>`).join('') +
      `<th class="added">Website</th>` +
      `<th class="added">FM Residency Page</th>` +
      `<th class="added">Apply Link</th>` +
      `<th class="added">Actions</th>` +
      '</tr>';

    // Rows
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    programs.forEach((p, i) => tbody.appendChild(makeRow(i)));
  }

  function makeRow(i) {
    const p = programs[i];
    const tr = document.createElement('tr');
    tr.id = `row-${i}`;

    // CSV columns
    let cells = csvHeaders.map((_, ci) => `<td class="csv-cell" title="${esc(p._csv[ci]||'')}">${esc(p._csv[ci]||'')}</td>`).join('');

    // Website cell
    cells += `<td class="link-cell" id="cell-web-${i}">${renderLink(p.website)}</td>`;

    // FM cell
    cells += `<td class="link-cell" id="cell-fm-${i}">${renderLink(p.fmLink)}</td>`;

    // Apply cell — editable input
    cells += `<td>
      <div class="apply-wrap">
        <input class="apply-input ${p.applyLink ? 'has-value' : ''}" id="apply-input-${i}"
          placeholder="Paste or auto-fetch…" value="${esc(p.applyLink)}"
          onchange="programs[${i}].applyLink=this.value;this.classList.toggle('has-value',!!this.value)"
          oninput="programs[${i}].applyLink=this.value;this.classList.toggle('has-value',!!this.value)"/>
      </div>
    </td>`;

    // Actions
    cells += `<td style="white-space:nowrap">
      <button class="btn btn-blue btn-sm" id="btn-web-${i}" onclick="getWebsite(${i})">
        <div class="spin" id="spin-web-${i}"></div>🌐
      </button>
      <button class="btn btn-green btn-sm" id="btn-res-${i}" onclick="getResidency(${i})" ${p.website ? '' : 'disabled'}>
        <div class="spin" id="spin-res-${i}"></div>🔍
      </button>
    </td>`;

    tr.innerHTML = cells;
    return tr;
  }

  function refreshRow(i) {
    const old = document.getElementById(`row-${i}`);
    old.replaceWith(makeRow(i));
  }

  function renderLink(url) {
    if (!url) return `<span class="badge badge-wait">—</span>`;
    const short = url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    return `<a href="${url}" target="_blank" title="${url}">${short.length>32 ? short.slice(0,32)+'…' : short}</a>`;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Per-row ──────────────────────────────────────────────────────
  async function getWebsite(i) {
    const btn = document.getElementById(`btn-web-${i}`);
    const spin = document.getElementById(`spin-web-${i}`);
    btn.disabled = true; spin.style.display = 'inline-block';
    document.getElementById(`cell-web-${i}`).innerHTML = `<span class="badge badge-wait">Searching…</span>`;
    try {
      const r = await fetch('/api/website', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ programName: getName(i) })
      });
      const d = await r.json();
      programs[i].website = d.website || '';
      document.getElementById(`cell-web-${i}`).innerHTML = d.website
        ? renderLink(d.website) : `<span class="badge badge-err">Not found</span>`;
      if (d.website) document.getElementById(`btn-res-${i}`).disabled = false;
    } catch {
      document.getElementById(`cell-web-${i}`).innerHTML = `<span class="badge badge-err">Error</span>`;
    }
    btn.disabled = false; spin.style.display = 'none';
  }

  async function getResidency(i) {
    if (!programs[i].website) return;
    const btn = document.getElementById(`btn-res-${i}`);
    const spin = document.getElementById(`spin-res-${i}`);
    btn.disabled = true; spin.style.display = 'inline-block';
    document.getElementById(`cell-fm-${i}`).innerHTML = `<span class="badge badge-wait">Searching…</span>`;
    const applyEl = document.getElementById(`apply-input-${i}`);
    if (applyEl) applyEl.placeholder = 'Searching…';
    try {
      const r = await fetch('/api/residency', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ website: programs[i].website })
      });
      const d = await r.json();
      programs[i].fmLink = d.fmLink || '';
      programs[i].applyLink = d.applyLink || programs[i].applyLink;
      document.getElementById(`cell-fm-${i}`).innerHTML = d.fmLink
        ? renderLink(d.fmLink) : `<span class="badge badge-err">Not found</span>`;
      if (applyEl) {
        applyEl.value = programs[i].applyLink;
        applyEl.placeholder = 'Paste or auto-fetch…';
        applyEl.classList.toggle('has-value', !!programs[i].applyLink);
      }
    } catch {
      document.getElementById(`cell-fm-${i}`).innerHTML = `<span class="badge badge-err">Error</span>`;
      if (applyEl) applyEl.placeholder = 'Paste or auto-fetch…';
    }
    btn.disabled = false; spin.style.display = 'none';
  }

  // ── Bulk ─────────────────────────────────────────────────────────
  async function getWebsiteAll() {
    for (let i = 0; i < programs.length; i++) {
      if (!programs[i].website) await getWebsite(i);
    }
  }

  async function getResidencyAll() {
    for (let i = 0; i < programs.length; i++) {
      if (programs[i].website && !programs[i].fmLink) await getResidency(i);
    }
  }

  // ── Download ──────────────────────────────────────────────────────
  function downloadCSV() {
    const headers = [...csvHeaders, 'Website', 'FM Residency Page', 'Apply Link'];
    const rows = [headers, ...programs.map(p => [
      ...csvHeaders.map((_, ci) => p._csv[ci] || ''),
      p.website, p.fmLink, p.applyLink
    ])];
    const csv = rows.map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'fm-residency-results.csv';
    a.click();
  }
</script>
</body>
</html>
